services:
  mysql:
    image: mysql:8.4
    container_name: walletflow-mysql
    environment:
      MYSQL_DATABASE: walletflow
      MYSQL_USER: walletflow
      MYSQL_PASSWORD: walletflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
